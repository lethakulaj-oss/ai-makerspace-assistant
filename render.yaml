services:
  - type: web
    name: makerspace-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_data
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        sync: false
